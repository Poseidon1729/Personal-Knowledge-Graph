services:
  - type: web
    name: GraphBrain
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input
    startCommand: gunicorn django_project.wsgi:application
    envVars:
      - key: NEO4J_URI
      - key: NEO4J_USERNAME
      - key: NEO4J_PASSWORD